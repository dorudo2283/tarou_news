<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タロウ NEWS</title>
    <style>
        /* ==========================================================================
           デザイン：角張ったシャープでクリーンなフラットブルー
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-color: #1C9AD6; 
            --dark-color: #0F2D4A;
            --light-bg: #F4F8FA;
            --text-main: #1D2A3A;
            --text-sub: #5C6F84;
            --border-color: #E2EAF1;
            /* 文字サイズ調整用の基本倍率 */
            --font-scale: 1;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
            /* スケール値に連動 */
            font-size: calc(16px * var(--font-scale));
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ==========================================================================
           Header (クリックでホームへ戻るロゴ / 歯車設定ボタン)
           ========================================================================== */
        .main-header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--primary-color);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(15, 45, 74, 0.04);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* タイトルを押すとホームに戻れる設計 */
        .logo-area {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }

        .logo-text {
            display: flex;
            align-items: baseline;
            gap: 6px;
            line-height: 1;
        }

        /* 角ゴシック */
        .logo-taro {
            font-family: "Impact", "Arial Black", sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: var(--dark-color);
            letter-spacing: -0.5px;
        }

        /* 明朝体 */
        .logo-news {
            font-family: "Georgia", "Times New Roman", "YuMincho", "MS Mincho", serif;
            font-weight: 700;
            font-size: 26px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .logo-area .subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.05em;
        }

        .search-and-settings {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            color: var(--text-sub);
            font-size: 14px;
            pointer-events: none;
        }

        .search-box input {
            width: 320px;
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--border-color);
            border-radius: 0; /* 丸みゼロに修正 */
            background-color: #fff;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.25s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(28, 154, 214, 0.15);
        }

        /* 歯車ボタン */
        .settings-btn {
            background-color: #fff;
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 0; /* 丸みゼロに修正 */
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:hover {
            background-color: var(--light-bg);
            border-color: var(--text-sub);
        }

        .settings-btn svg {
            fill: var(--text-sub);
            transition: fill 0.2s, transform 0.3s ease;
        }

        .settings-btn:hover svg {
            fill: var(--dark-color);
            transform: rotate(45deg); /* ホバーすると回るギミック */
        }

        /* ==========================================================================
           News Section & Card
           ========================================================================== */
        .news-section {
            margin: 40px auto;
        }

        .hidden {
            display: none !important;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--dark-color);
            padding-bottom: 12px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark-color);
            letter-spacing: -0.02em;
        }

        .section-header .search-status-text {
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 700;
            margin-left: auto;
            background-color: rgba(28, 154, 214, 0.1);
            padding: 4px 12px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* カードの角丸を直線へ */
        .news-card {
            background-color: #fff;
            border-radius: 0; /* 角を直線に */
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: all 0.25s ease;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(15, 45, 74, 0.03);
        }

        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(15, 45, 74, 0.07);
            border-color: var(--primary-color);
        }

        .news-title-area {
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            min-height: 160px;
        }

        .news-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: var(--dark-color);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card:hover .news-title {
            color: var(--primary-color);
        }

        .news-date {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        /* ==========================================================================
           記事登録フォームエリア (ホーム画面の下に表示)
           ========================================================================== */
        .article-form-section {
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 30px;
            margin: 50px auto;
        }

        .form-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--dark-color);
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            outline: none;
            font-size: 14px;
            background-color: var(--light-bg);
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .submit-btn {
            background-color: var(--dark-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--primary-color);
        }

        /* ==========================================================================
           Article Detail View
           ========================================================================== */
        .detail-view {
            background-color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 0;
            padding: 50px;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(15, 45, 74, 0.03);
        }

        .back-btn {
            background-color: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-sub);
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 0;
            cursor: pointer;
            margin-bottom: 40px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            border-color: var(--dark-color);
            color: var(--dark-color);
            background-color: var(--light-bg);
        }

        .detail-date {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
        }

        .detail-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark-color);
            line-height: 1.4;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 24px;
        }

        .detail-body {
            font-size: 16px;
            line-height: 2.0;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        /* ==========================================================================
           設定モーダル
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 45, 74, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .settings-modal {
            background-color: #fff;
            border-top: 4px solid var(--primary-color);
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header-area h3 {
            font-size: 18px;
            font-weight: 800;
            color: var(--dark-color);
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-sub);
        }

        .font-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .font-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            background-color: var(--light-bg);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .font-btn.active {
            background-color: var(--dark-color);
            color: #fff;
            border-color: var(--dark-color);
        }

        /* ==========================================================================
           フッター
           ========================================================================== */
        .main-footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            border-top: 1px solid var(--border-color);
        }

        .copyright {
            font-size: 13px;
            color: #a0b0c0; /* 薄文字 */
            margin-bottom: 4px;
            font-weight: 600;
        }

        .license {
            font-size: 11px;
            color: #b8c8d8;
            letter-spacing: 0.05em;
        }

        /* ==========================================================================
           Responsive Design
           ========================================================================== */
        @media (max-width: 1024px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input, .search-box input:focus {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container container">
            <!-- タイトルをクリックするとホーム（新着順）へ戻る -->
            <div class="logo-area" id="logoHomeBtn">
                <div class="logo-text">
                    <span class="logo-taro">タロウ</span>
                    <span class="logo-news">NEWS</span>
                </div>
                <p class="subtitle">~ 気になるニュースを紹介 ~</p>
            </div>
            
            <div class="search-and-settings">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="キーワードを入力しEnterで検索">
                </div>
                <!-- 歯車アイコンのSVGマークに変更 -->
                <button class="settings-btn" id="settingsBtn" title="文字サイズ変更">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section class="news-section" id="newsSection">
            <div class="section-header">
                <h2 id="sectionTitle">新着順</h2>
                <div id="searchStatus" class="search-status-text hidden"></div>
            </div>
            
            <div class="news-grid" id="newsGrid"></div>
        </section>

        <!-- 新規記事登録エリア -->
        <section class="article-form-section" id="formSection">
            <h3 class="form-title">ニュース記事を登録する</h3>
            <form id="addArticleForm">
                <div class="form-group">
                    <label for="newTitle">記事タイトル</label>
                    <input type="text" id="newTitle" required placeholder="例: 最新ウェブトレンドについて">
                </div>
                <div class="form-group">
                    <label for="newDate">日付</label>
                    <input type="text" id="newDate" required placeholder="例: 2026.07.16">
                </div>
                <div class="form-group">
                    <label for="newContent">記事本文</label>
                    <textarea id="newContent" rows="5" required placeholder="記事の本文を入力してください"></textarea>
                </div>
                <button type="submit" class="submit-btn">新規記事を登録</button>
            </form>
        </section>

        <section class="detail-section hidden" id="detailSection">
            <div class="detail-view">
                <button class="back-btn" id="backToListBtn">← 一覧に戻る</button>
                <span class="detail-date" id="detailDate"></span>
                <h2 class="detail-title" id="detailTitle"></h2>
                <div class="detail-body" id="detailBody"></div>
            </div>
        </section>

    </main>

    <!-- 設定モーダル（初期状態はhidden） -->
    <div class="modal-overlay hidden" id="settingsModal">
        <div class="settings-modal">
            <div class="modal-header-area">
                <h3>サイト設定</h3>
                <button class="close-modal-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="setting-item">
                <p style="font-size: 14px; font-weight:700; color: var(--text-main); margin-bottom:10px;">文字サイズ</p>
                <div class="font-options">
                    <button class="font-btn" data-scale="0.85">小</button>
                    <button class="font-btn active" data-scale="1.0">標準</button>
                    <button class="font-btn" data-scale="1.2">大</button>
                </div>
            </div>
        </div>
    </div>

    <!-- フッターエリア -->
    <footer class="main-footer">
        <div class="container">
            <p class="copyright">&copy;Tarou</p>
            <p class="license">license by Tarou</p>
        </div>
    </footer>

    <script src="News.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // News.jsデータの確認（存在しない場合は初期データ定義）
            let localArticles = [];
            if (typeof newsArticles !== 'undefined') {
                localArticles = [...newsArticles];
            } else {
                console.error("News.jsデータが見つかりません。");
                document.getElementById('newsGrid').innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: red; background:#fff;">News.jsデータが見つかりません。</div>';
                return;
            }

            const newsSection = document.getElementById('newsSection');
            const newsGrid = document.getElementById('newsGrid');
            const detailSection = document.getElementById('detailSection');
            const formSection = document.getElementById('formSection');
            const searchInput = document.getElementById('searchInput');
            
            const sectionTitle = document.getElementById('sectionTitle');
            const searchStatus = document.getElementById('searchStatus');

            const backToListBtn = document.getElementById('backToListBtn');
            const detailDate = document.getElementById('detailDate');
            const detailTitle = document.getElementById('detailTitle');
            const detailBody = document.getElementById('detailBody');

            const logoHomeBtn = document.getElementById('logoHomeBtn');
            const addArticleForm = document.getElementById('addArticleForm');

            // 設定モーダル関連
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const fontButtons = document.querySelectorAll('.font-btn');

            // 1. ニュース一覧を描画
            function renderNews(articles) {
                newsGrid.innerHTML = '';

                if (articles.length === 0) {
                    newsGrid.innerHTML = `
                        <div style="grid-column: 1/-1; padding: 60px 20px; text-align: center; background: #fff; color: var(--text-sub); border: 1px dashed var(--border-color);">
                            該当する記事が見つかりませんでした。
                        </div>
                    `;
                    return;
                }

                articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.setAttribute('data-id', article.id);
                    
                    card.innerHTML = `
                        <div class="news-title-area">
                            <h3 class="news-title">${escapeHTML(article.title)}</h3>
                            <span class="news-date">${escapeHTML(article.date)}</span>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => {
                        showArticleDetail(article);
                    });

                    newsGrid.appendChild(card);
                });
            }

            // 2. 詳細ページに切り替える
            function showArticleDetail(article) {
                detailDate.textContent = article.date;
                detailTitle.textContent = article.title;
                detailBody.textContent = article.content;

                newsSection.classList.add('hidden');
                formSection.classList.add('hidden'); // 詳細表示時は登録フォームも隠す
                detailSection.classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // 3. 一覧ページへ戻る
            function backToHome() {
                detailSection.classList.add('hidden');
                newsSection.classList.remove('hidden');
                formSection.classList.remove('hidden');
            }

            backToListBtn.addEventListener('click', backToHome);

            // 4. タイトルロゴを押してホーム（検索リセット・新着順）に戻る
            logoHomeBtn.addEventListener('click', () => {
                searchInput.value = '';
                sectionTitle.textContent = "新着順";
                searchStatus.classList.add('hidden');
                backToHome();
                renderNews(localArticles);
            });

            // 5. 新規記事の登録処理
            addArticleForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const titleInput = document.getElementById('newTitle');
                const dateInput = document.getElementById('newDate');
                const contentInput = document.getElementById('newContent');

                const newArticle = {
                    id: localArticles.length > 0 ? Math.max(...localArticles.map(a => a.id)) + 1 : 1,
                    title: titleInput.value.trim(),
                    date: dateInput.value.trim(),
                    content: contentInput.value.trim()
                };

                // 配列の最後に追加（ホーム画面の下にどんどん追加される）
                localArticles.push(newArticle);

                // フォームの入力内容をリセット
                addArticleForm.reset();

                // リストを再描画
                renderNews(localArticles);

                // 追加が視覚的にわかるように少しスクロール
                const lastCard = newsGrid.lastElementChild;
                if (lastCard) {
                    lastCard.scrollIntoView({ behavior: 'smooth' });
                }
            });

            // 6. 検索キー判定 (Enter)
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    
                    const query = e.target.value.trim();
                    
                    detailSection.classList.add('hidden');
                    newsSection.classList.remove('hidden');
                    formSection.classList.remove('hidden');

                    if (query === "") {
                        sectionTitle.textContent = "新着順";
                        searchStatus.classList.add('hidden');
                        renderNews(localArticles);
                        return;
                    }

                    const queryLower = query.toLowerCase();
                    const filtered = localArticles.filter(article => 
                        article.title.toLowerCase().includes(queryLower) || 
                        article.content.toLowerCase().includes(queryLower)
                    );

                    sectionTitle.textContent = `「${query}」の検索結果`;
                    searchStatus.textContent = "一致順";
                    searchStatus.classList.remove('hidden');
                    
                    renderNews(filtered);
                }
            });

            // 7. 歯車設定モーダルの開閉とスケール処理
            settingsBtn.addEventListener('click', () => {
                settingsModal.classList.remove('hidden');
            });

            closeModalBtn.addEventListener('click', () => {
                settingsModal.classList.add('hidden');
            });

            // モーダルの外側をクリックしたら閉じる
            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    settingsModal.classList.add('hidden');
                }
            });

            fontButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    fontButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    // CSSのカスタムプロパティを書き換えて、全体のサイズを制御
                    const scale = btn.getAttribute('data-scale');
                    document.documentElement.style.setProperty('--font-scale', scale);
                });
            });

            // XSS対策
            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
                );
            }

            renderNews(localArticles);
        });
    </script>
</body>
