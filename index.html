<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気になるニュースを紹介</title>
    <style>
        /* ==========================================================================
           Base Styles & Reset
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
            background-color: #fcfcfc;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ==========================================================================
           Header (テキストロゴ「タロウ NEWS」を実装)
           ========================================================================== */
        .main-header {
            background-color: #e0e0e0;
            border-bottom: 1px solid #ccc;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* テキストロゴのスタイル */
        .logo-text {
            display: flex;
            align-items: baseline;
            gap: 4px;
            line-height: 1;
        }

        /* 太い角ゴシック */
        .logo-taro {
            font-family: "Impact", "Arial Black", "Noto Sans JP", sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: #111;
            letter-spacing: -0.5px;
        }

        /* 明朝体 */
        .logo-news {
            font-family: "Georgia", "Times New Roman", "YuMincho", "MS Mincho", serif;
            font-weight: 500;
            font-size: 24px;
            color: #444;
            letter-spacing: 1px;
        }

        .logo-area .subtitle {
            font-size: 11px;
            color: #666;
        }

        .search-and-settings {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            color: #777;
            font-size: 14px;
            pointer-events: none;
        }

        .search-box input {
            width: 280px;
            padding: 8px 12px 8px 36px;
            border: 1px solid #ccc;
            background-color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            border-color: #111;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .settings-btn {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background-color: #f0f0f0;
        }

        /* ==========================================================================
           News Section (5カラムグリッド)
           ========================================================================== */
        .news-section {
            margin: 40px auto;
        }

        /* 画面切り替え用：非表示にする要素 */
        .hidden {
            display: none !important;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .section-header .arrow {
            font-size: 16px;
            color: #666;
        }

        /* 5列グリッド：1pxの黒い境界線 */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border: 1px solid #333;
            background-color: #333;
            gap: 1px;
            overflow: hidden;
        }

        /* ==========================================================================
           News Card (画像領域なし・タイトルと日付のみ)
           ========================================================================== */
        .news-card {
            background-color: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: background-color 0.15s ease;
            min-height: 140px; /* テキストのみで美しさを担保 */
        }

        .news-title-area {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
            color: #222;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-date {
            font-size: 10px;
            color: #999;
            margin-top: 15px;
            text-align: right;
        }

        .news-card:hover {
            background-color: #f7f7f7;
        }

        .news-card:hover .news-title {
            color: #000;
        }

        /* ==========================================================================
           Article Detail View (単一ページ風の全画面詳細エリア)
           ========================================================================== */
        .detail-view {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 40px;
            margin-top: 20px;
            border-radius: 4px;
        }

        .back-btn {
            background-color: #fff;
            border: 1px solid #333;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.15s;
            display: inline-block;
        }

        .back-btn:hover {
            background-color: #111;
            color: #fff;
        }

        .detail-date {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            display: block;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 800;
            color: #111;
            line-height: 1.4;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .detail-body {
            font-size: 15px;
            line-height: 1.9;
            color: #333;
            white-space: pre-wrap; /* 改行を有効にする */
        }

        /* ==========================================================================
           Responsive Design
           ========================================================================== */
        @media (max-width: 1024px) {
            .news-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header-container {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-and-settings {
                width: 100%;
            }
            .search-box, .search-box input {
                width: 100%;
            }
            .detail-view {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <!-- 画像ロゴを廃止し、デザインされたテキストロゴへ変更 -->
                <div class="logo-text">
                    <span class="logo-taro">タロウ</span>
                    <span class="logo-news">NEWS</span>
                </div>
                <p class="subtitle">~ 気になるニュースを紹介 ~</p>
            </div>
            
            <div class="search-and-settings">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="キーワードを入力しEnterで検索">
                </div>
                <button class="settings-btn">設定マーク</button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section class="news-section" id="newsSection">
            <div class="section-header">
                <!-- 表示を「新着順」から「一致順」へ変更 -->
                <h2>一致順</h2>
                <span class="arrow">&gt;</span>
            </div>
            
            <div class="news-grid" id="newsGrid"></div>
        </section>

        <section class="detail-section hidden" id="detailSection">
            <div class="detail-view">
                <button class="back-btn" id="backToListBtn">← 一覧に戻る</button>
                <span class="detail-date" id="detailDate"></span>
                <h2 class="detail-title" id="detailTitle"></h2>
                <div class="detail-body" id="detailBody"></div>
            </div>
        </section>

    </main>

    <script src="News.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            if (typeof newsArticles === 'undefined') {
                console.error("News.jsデータが見つかりません。");
                document.getElementById('newsGrid').innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: red; background:#fff;">News.jsデータが見つかりません。</div>';
                return;
            }

            const newsSection = document.getElementById('newsSection');
            const newsGrid = document.getElementById('newsGrid');
            const detailSection = document.getElementById('detailSection');
            const searchInput = document.getElementById('searchInput');
            
            const backToListBtn = document.getElementById('backToListBtn');
            const detailDate = document.getElementById('detailDate');
            const detailTitle = document.getElementById('detailTitle');
            const detailBody = document.getElementById('detailBody');

            // 1. ニュース一覧を描画
            function renderNews(articles) {
                newsGrid.innerHTML = '';

                if (articles.length === 0) {
                    newsGrid.innerHTML = `
                        <div style="grid-column: 1/-1; padding: 40px; text-align: center; background: #fff; color: #777;">
                            該当する記事が見つかりませんでした。
                        </div>
                    `;
                    return;
                }

                articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.setAttribute('data-id', article.id);
                    
                    // タイトルと日付のみ
                    card.innerHTML = `
                        <div class="news-title-area">
                            <h3 class="news-title">${escapeHTML(article.title)}</h3>
                            <span class="news-date">${escapeHTML(article.date)}</span>
                        </div>
                    `;
                    
                    // 記事クリック時：前面全体表示に切り替え
                    card.addEventListener('click', () => {
                        showArticleDetail(article);
                    });

                    newsGrid.appendChild(card);
                });
            }

            // 2. 詳細ページ（前面表示）に切り替える
            function showArticleDetail(article) {
                detailDate.textContent = article.date;
                detailTitle.textContent = article.title;
                detailBody.textContent = article.content;

                // 一覧を非表示、詳細を表示
                newsSection.classList.add('hidden');
                detailSection.classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // 3. 一覧ページへ戻る
            backToListBtn.addEventListener('click', () => {
                detailSection.classList.add('hidden');
                newsSection.classList.remove('hidden');
            });

            // 4. キー判定（Enter押下時に「1文字部分一致」抽出）
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    
                    const query = e.target.value.toLowerCase().trim();
                    
                    // 検索時は一覧画面を表示（詳細からでも一覧に戻す）
                    detailSection.classList.add('hidden');
                    newsSection.classList.remove('hidden');

                    if (query === "") {
                        renderNews(newsArticles);
                        return;
                    }

                    // 部分一致する記事を抽出
                    const filtered = newsArticles.filter(article => 
                        article.title.toLowerCase().includes(query) || 
                        article.content.toLowerCase().includes(query)
                    );
                    
                    renderNews(filtered);
                }
            });

            // セキュリティ：XSS対策
            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
                );
            }

            renderNews(newsArticles);
        });
    </script>
</body>
</html>
