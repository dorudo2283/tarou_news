<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タロウ NEWS</title>
    <style>
        /* ==========================================================================
           デザイン刷新：ユニセフにインスパイアされたクリーン＆モダン・ブルー
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* ユニセフをイメージした鮮やかで信頼感のあるシアンブルーと濃紺 */
            --primary-color: #1C9AD6; 
            --dark-color: #0F2D4A;
            --light-bg: #F4F8FA;
            --text-main: #1D2A3A;
            --text-sub: #5C6F84;
            --border-color: #E2EAF1;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ==========================================================================
           Header (テキストロゴ「タロウ NEWS」)
           ========================================================================== */
        .main-header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--primary-color);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(15, 45, 74, 0.05);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-decoration: none;
        }

        .logo-text {
            display: flex;
            align-items: baseline;
            gap: 6px;
            line-height: 1;
        }

        /* 太い角ゴシック (インパクトと信頼感) */
        .logo-taro {
            font-family: "Impact", "Arial Black", sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: var(--dark-color);
            letter-spacing: -0.5px;
        }

        /* 明朝体 (知的なアクセント) */
        .logo-news {
            font-family: "Georgia", "Times New Roman", "YuMincho", "MS Mincho", serif;
            font-weight: 700;
            font-size: 26px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .logo-area .subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.05em;
        }

        /* 検索窓 */
        .search-and-settings {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            color: var(--text-sub);
            font-size: 14px;
            pointer-events: none;
        }

        .search-box input {
            width: 320px;
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--border-color);
            border-radius: 30px; /* 角を丸くしてモダンに */
            background-color: #fff;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.25s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(28, 154, 214, 0.15);
            width: 360px; /* フォーカス時に少し広げるギミック */
        }

        .settings-btn {
            background-color: #fff;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background-color: var(--light-bg);
            border-color: var(--text-sub);
            color: var(--dark-color);
        }

        /* ==========================================================================
           News Section (ユニセフ風カードデザイン＆1pxグリッド境界の排除)
           ========================================================================== */
        .news-section {
            margin: 50px auto;
        }

        .hidden {
            display: none !important;
        }

        /* セクションヘッダー：太字とアンダーラインで雑誌のように */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--dark-color);
            padding-bottom: 12px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark-color);
            letter-spacing: -0.02em;
        }

        /* 検索時に切り替わるサブテキスト */
        .section-header .search-status-text {
            font-size: 15px;
            color: var(--primary-color);
            font-weight: 700;
            margin-left: auto; /* 右寄せ */
            background-color: rgba(28, 154, 214, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
        }

        /* 3列カードグリッド（ユニセフ風：余白を広めにとり、カードを浮き立たせる） */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* ==========================================================================
           News Card (洗練された影、ホバー時のカード上昇アニメーション)
           ========================================================================== */
        .news-card {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(15, 45, 74, 0.04);
        }

        .news-card:hover {
            transform: translateY(-5px); /* ふわっと浮き上がる */
            box-shadow: 0 12px 30px rgba(15, 45, 74, 0.08);
            border-color: var(--primary-color);
        }

        .news-title-area {
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            min-height: 180px;
        }

        .news-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            color: var(--dark-color);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.2s ease;
        }

        .news-card:hover .news-title {
            color: var(--primary-color); /* ホバーするとブルーに */
        }

        /* カテゴリタグ風のダミーアクセント（よりWebメディアらしく見せる） */
        .news-tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-color);
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        .news-date {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        /* ==========================================================================
           Article Detail View (雑誌の記事のようなレイアウト)
           ========================================================================== */
        .detail-view {
            background-color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 50px;
            margin-top: 30px;
            box-shadow: 0 4px 20px rgba(15, 45, 74, 0.04);
        }

        .back-btn {
            background-color: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-sub);
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            border-color: var(--dark-color);
            color: var(--dark-color);
            background-color: var(--light-bg);
        }

        .detail-date {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
            letter-spacing: 0.05em;
        }

        .detail-title {
            font-size: 30px;
            font-weight: 800;
            color: var(--dark-color);
            line-height: 1.4;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 24px;
        }

        .detail-body {
            font-size: 16px;
            line-height: 2.0;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        /* ==========================================================================
           Responsive Design
           ========================================================================== */
        @media (max-width: 1024px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr; /* スマホは1列にスッキリと */
            }
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input, .search-box input:focus {
                width: 100%;
            }
            .detail-view {
                padding: 30px 20px;
            }
            .detail-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container container">
            <div class="logo-area">
                <div class="logo-text">
                    <span class="logo-taro">タロウ</span>
                    <span class="logo-news">NEWS</span>
                </div>
                <p class="subtitle">~ 気になるニュースを紹介 ~</p>
            </div>
            
            <div class="search-and-settings">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="キーワードを入力しEnterで検索">
                </div>
                <button class="settings-btn">設定</button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section class="news-section" id="newsSection">
            <div class="section-header">
                <!-- 動的に書き換わるタイトルエリア -->
                <h2 id="sectionTitle">新着順</h2>
                <div id="searchStatus" class="search-status-text hidden"></div>
            </div>
            
            <div class="news-grid" id="newsGrid"></div>
        </section>

        <section class="detail-section hidden" id="detailSection">
            <div class="detail-view">
                <button class="back-btn" id="backToListBtn">← 一覧に戻る</button>
                <span class="detail-date" id="detailDate"></span>
                <h2 class="detail-title" id="detailTitle"></h2>
                <div class="detail-body" id="detailBody"></div>
            </div>
        </section>

    </main>

    <script src="News.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            if (typeof newsArticles === 'undefined') {
                console.error("News.jsデータが見つかりません。");
                document.getElementById('newsGrid').innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: red; background:#fff;">News.jsデータが見つかりません。</div>';
                return;
            }

            const newsSection = document.getElementById('newsSection');
            const newsGrid = document.getElementById('newsGrid');
            const detailSection = document.getElementById('detailSection');
            const searchInput = document.getElementById('searchInput');
            
            const sectionTitle = document.getElementById('sectionTitle');
            const searchStatus = document.getElementById('searchStatus');

            const backToListBtn = document.getElementById('backToListBtn');
            const detailDate = document.getElementById('detailDate');
            const detailTitle = document.getElementById('detailTitle');
            const detailBody = document.getElementById('detailBody');

            // 1. ニュース一覧を描画
            function renderNews(articles) {
                newsGrid.innerHTML = '';

                if (articles.length === 0) {
                    newsGrid.innerHTML = `
                        <div style="grid-column: 1/-1; padding: 60px 20px; text-align: center; background: #fff; border-radius: 8px; border: 1px dashed var(--border-color); color: var(--text-sub);">
                            該当する記事が見つかりませんでした。
                        </div>
                    `;
                    return;
                }

                articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.setAttribute('data-id', article.id);
                    
                    // ユニセフ等の活動報告カードのように、上部にカテゴリ風ラベル、下部に点線と日付を配置
                    card.innerHTML = `
                        <div class="news-title-area">
                            <div>
                                <div class="news-tag">Report</div>
                                <h3 class="news-title">${escapeHTML(article.title)}</h3>
                            </div>
                            <span class="news-date">${escapeHTML(article.date)}</span>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => {
                        showArticleDetail(article);
                    });

                    newsGrid.appendChild(card);
                });
            }

            // 2. 詳細ページに切り替える
            function showArticleDetail(article) {
                detailDate.textContent = article.date;
                detailTitle.textContent = article.title;
                detailBody.textContent = article.content;

                newsSection.classList.add('hidden');
                detailSection.classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // 3. 一覧ページへ戻る
            backToListBtn.addEventListener('click', () => {
                detailSection.classList.add('hidden');
                newsSection.classList.remove('hidden');
            });

            // 4. 検索キー判定 (Enter)
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    
                    const query = e.target.value.trim();
                    
                    // 検索時は必ず一覧画面に戻す
                    detailSection.classList.add('hidden');
                    newsSection.classList.remove('hidden');

                    if (query === "") {
                        // 空文字でEnterならデフォルトの新着順に戻す
                        sectionTitle.textContent = "新着順";
                        searchStatus.classList.add('hidden');
                        renderNews(newsArticles);
                        return;
                    }

                    // 1文字以上の部分一致検索
                    const queryLower = query.toLowerCase();
                    const filtered = newsArticles.filter(article => 
                        article.title.toLowerCase().includes(queryLower) || 
                        article.content.toLowerCase().includes(queryLower)
                    );

                    // 検索中の表示変更の適用
                    // 例: 「"AI"の検索結果」と表記を出しつつ、その下は「一致順」として出力
                    sectionTitle.textContent = `「${query}」の検索結果`;
                    searchStatus.textContent = "一致順";
                    searchStatus.classList.remove('hidden');
                    
                    renderNews(filtered);
                }
            });

            // XSS対策
            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
                );
            }

            // 初期ロード時は「新着順」
            renderNews(newsArticles);
        });
    </script>
</body>
</html>
