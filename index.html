<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タロウ NEWS</title>
    <style>
        /* ==========================================================================
           デザイン角張ったシャープでクリーンなフラットブルー（浮き上がり廃止）
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-color: #1C9AD6; 
            --dark-color: #0F2D4A;
            --light-bg: #F4F8FA;
            --text-main: #1D2A3A;
            --text-sub: #5C6F84;
            --border-color: #E2EAF1;
            /* 文字サイズ調整用の基本倍率（CSS変数で管理） */
            --font-scale: 1;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
            /* サイト全体のサイズを動的に切り替え可能に */
            font-size: calc(16px * var(--font-scale));
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ==========================================================================
           Header (クリックでホームへ戻るロゴ / 歯車設定ボタン)
           ========================================================================== */
        .main-header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--primary-color);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(15, 45, 74, 0.04);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }

        .logo-text {
            display: flex;
            align-items: baseline;
            gap: 6px;
            line-height: 1;
        }

        /* 角ゴシック */
        .logo-taro {
            font-family: "Impact", "Arial Black", sans-serif;
            font-weight: 900;
            font-size: calc(32px * var(--font-scale));
            color: var(--dark-color);
            letter-spacing: -0.5px;
        }

        /* 明朝体 */
        .logo-news {
            font-family: "Georgia", "Times New Roman", "YuMincho", "MS Mincho", serif;
            font-weight: 700;
            font-size: calc(26px * var(--font-scale));
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .logo-area .subtitle {
            font-size: calc(11px * var(--font-scale));
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.05em;
        }

        .search-and-settings {
            display: flex;
            align-items: center;
            gap: 12px;
            /* 検索エリア全体の幅を明示的に確保 */
            min-width: 557px; 
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            /* 親の幅いっぱいに広げる */
            width: 100%; 
        }

        .search-icon {
            position: absolute;
            left: 14px;
            color: var(--text-sub);
            font-size: calc(14px * var(--font-scale));
            pointer-events: none;
        }

        /* 検索窓自体の幅を500pxで完全に固定・拡張 */
        .search-box input {
            width: 500px;
            flex-shrink: 0; /* 縮まないように固定 */
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--border-color);
            border-radius: 0; /* 丸みゼロ */
            background-color: #fff;
            font-size: calc(14px * var(--font-scale));
            color: var(--text-main);
            outline: none;
            transition: border-color 0.25s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(28, 154, 214, 0.15);
        }

        /* 歯車ボタン */
        .settings-btn {
            background-color: #fff;
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 0;
            flex-shrink: 0; /* 縮まないように固定 */
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:hover {
            background-color: var(--light-bg);
            border-color: var(--text-sub);
        }

        .settings-btn svg {
            fill: var(--text-sub);
            transition: fill 0.2s, transform 0.3s ease;
        }

        .settings-btn:hover svg {
            fill: var(--dark-color);
            transform: rotate(45deg);
        }

        /* ==========================================================================
           News Section & Card
           ========================================================================== */
        .news-section {
            margin: 40px auto;
        }

        .hidden {
            display: none !important;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--dark-color);
            padding-bottom: 12px;
        }

        .section-header h2 {
            font-size: calc(22px * var(--font-scale));
            font-weight: 800;
            color: var(--dark-color);
            letter-spacing: -0.02em;
        }

        .section-header .search-status-text {
            font-size: calc(14px * var(--font-scale));
            color: var(--primary-color);
            font-weight: 700;
            margin-left: auto;
            background-color: rgba(28, 154, 214, 0.1);
            padding: 4px 12px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* カードの角丸と、浮き上がるホバー（translateY）を完全撤廃 */
        .news-card {
            background-color: #fff;
            border-radius: 0;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(15, 45, 74, 0.03);
        }

        .news-card:hover {
            /* 浮かせず、背景色とボーダーの変更で綺麗に見せる */
            background-color: #F8FCFE;
            border-color: var(--primary-color);
        }

        .news-title-area {
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            min-height: 160px;
        }

        .news-title {
            font-size: calc(16px * var(--font-scale));
            font-weight: 700;
            line-height: 1.5;
            color: var(--dark-color);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card:hover .news-title {
            color: var(--primary-color);
        }

        .news-date {
            font-size: calc(12px * var(--font-scale));
            font-weight: 600;
            color: var(--text-sub);
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        /* ==========================================================================
           お気に入り（ブックマーク）一覧セクション（ホームの下部）
           ========================================================================== */
        .bookmark-section {
            margin: 60px auto;
            border-top: 2px solid var(--border-color);
            padding-top: 40px;
        }

        /* ==========================================================================
           Article Detail View
           ========================================================================== */
        .detail-view {
            background-color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 0;
            padding: 50px;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(15, 45, 74, 0.03);
        }

        .detail-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-btn {
            background-color: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-sub);
            padding: 10px 20px;
            font-size: calc(13px * var(--font-scale));
            font-weight: 700;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            border-color: var(--dark-color);
            color: var(--dark-color);
            background-color: var(--light-bg);
        }

        /* お気に入り登録ボタン */
        .bookmark-btn {
            background-color: #fff;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 20px;
            font-size: calc(13px * var(--font-scale));
            font-weight: 700;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .bookmark-btn:hover {
            border-color: #FFC107;
            background-color: #FFFDF5;
        }

        .bookmark-btn.active {
            background-color: #FFC107;
            border-color: #FFC107;
            color: #fff;
        }

        .detail-date {
            font-size: calc(14px * var(--font-scale));
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
        }

        .detail-title {
            font-size: calc(28px * var(--font-scale));
            font-weight: 800;
            color: var(--dark-color);
            line-height: 1.4;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 24px;
        }

        .detail-body {
            font-size: calc(16px * var(--font-scale));
            line-height: 2.0;
            color: var(--text-main);
        }

        /* 💡 記事内に挿入される画像のスタイル（3行分の完璧な余白設計） */
        .detail-article-img {
            display: block;
            max-width: 100%;
            height: auto;
            /* 本文のline-height: 2.0に基づき、上下にちょうど3行分の余白(3.0em)を付与 */
            margin: 3.0em 0; 
            border: 1px solid var(--border-color);
        }

        /* ==========================================================================
           設定モーダル
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 45, 74, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .settings-modal {
            background-color: #fff;
            border-top: 4px solid var(--primary-color);
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header-area h3 {
            font-size: calc(18px * var(--font-scale));
            font-weight: 800;
            color: var(--dark-color);
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-sub);
        }

        .font-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .font-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            background-color: var(--light-bg);
            font-weight: 700;
            font-size: calc(14px * var(--font-scale));
            cursor: pointer;
            transition: all 0.2s;
        }

        .font-btn.active {
            background-color: var(--dark-color);
            color: #fff;
            border-color: var(--dark-color);
        }

        /* ==========================================================================
           フッター
           ========================================================================== */
        .main-footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            border-top: 1px solid var(--border-color);
        }

        .copyright {
            font-size: 13px;
            color: #a0b0c0; /* 薄文字 */
            margin-bottom: 4px;
            font-weight: 600;
        }

        .license {
            font-size: 11px;
            color: #b8c8d8;
            letter-spacing: 0.05em;
        }

        /* ==========================================================================
           Responsive Design
           ========================================================================== */
        @media (max-width: 1024px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            /* タブレットサイズでも崩れないように調整 */
            .search-and-settings {
                min-width: auto;
                width: 100%;
                max-width: 557px;
            }
            .search-box input {
                width: 100%;
                flex-shrink: 1;
            }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }
            .search-and-settings {
                width: 100%;
                min-width: auto;
            }
            .search-box {
                width: 100%;
            }
            .search-box input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container container">
            <div class="logo-area" id="logoHomeBtn">
                <div class="logo-text">
                    <span class="logo-taro">タロウ</span>
                    <span class="logo-news">NEWS</span>
                </div>
                <p class="subtitle">~ 気になるニュースを紹介 ~</p>
            </div>
            
            <div class="search-and-settings">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="キーワードを入力して検索">
                </div>
                <button class="settings-btn" id="settingsBtn" title="文字サイズ変更">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>

                </button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section class="news-section" id="newsSection">
            <div class="section-header">
                <h2 id="sectionTitle">新着順</h2>
                <div id="searchStatus" class="search-status-text hidden"></div>
            </div>
            
            <div class="news-grid" id="newsGrid"></div>
        </section>

        <section class="news-section bookmark-section" id="bookmarkSection">
            <div class="section-header">
                <h2>登録した記事（お気に入り）</h2>
            </div>
            <div class="news-grid" id="bookmarkGrid"></div>
        </section>

        <section class="detail-section hidden" id="detailSection">
            <div class="detail-view">
                <div class="detail-actions">
                    <button class="back-btn" id="backToListBtn">← 一覧に戻る</button>
                    <button class="bookmark-btn" id="bookmarkToggleBtn">
                        <span class="star-icon">☆</span> お気に入りに登録
                    </button>
                </div>
                <span class="detail-date" id="detailDate"></span>
                <h2 class="detail-title" id="detailTitle"></h2>
                <div class="detail-body" id="detailBody"></div>

        </section>

    </main>

    <div class="modal-overlay hidden" id="settingsModal">
        <div class="settings-modal">
            <div class="modal-header-area">
                <h3>サイト設定</h3>
                <button class="close-modal-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="setting-item">
                <p style="font-size: 14px; font-weight:700; color: var(--text-main); margin-bottom:10px;">文字サイズ</p>
                <div class="font-options">
                    <button class="font-btn" data-scale="0.85">小</button>
                    <button class="font-btn active" data-scale="1.0">標準</button>
                    <button class="font-btn" data-scale="1.2">大</button>

            </div>
        </div>
    </div>

            <p class="copyright">&copy; 2026 SAITO index </p>
            <p class="license">Server:GitHub Pages 当ウェブサイトの内容はSAITO indexに属します。引用・転載をする場合は著作権表示をお願いいたします。</p>
        </div>
    </footer>

    <script src="News.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 記事データの読み込み
            let articles = [];
            if (typeof newsArticles !== 'undefined') {
                articles = [...newsArticles];
            } else {
                console.error("News.jsデータが見つかりません。");
                document.getElementById('newsGrid').innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: red; background:#fff;">News.jsデータが見つかりません。</div>';
                return;
            }

            // お気に入り（登録した記事）のIDをローカルストレージまたは配列で保持
            let bookmarkedIds = JSON.parse(localStorage.getItem('bookmarkedIds')) || [];

            // 現在閲覧している詳細ページの記事ID
            let currentArticleId = null;

            // DOM要素
            const newsSection = document.getElementById('newsSection');
            const newsGrid = document.getElementById('newsGrid');
            const bookmarkSection = document.getElementById('bookmarkSection');
            const bookmarkGrid = document.getElementById('bookmarkGrid');
            const detailSection = document.getElementById('detailSection');
            const searchInput = document.getElementById('searchInput');
            
            const sectionTitle = document.getElementById('sectionTitle');
            const searchStatus = document.getElementById('searchStatus');

            const backToListBtn = document.getElementById('backToListBtn');
            const bookmarkToggleBtn = document.getElementById('bookmarkToggleBtn');
            const detailDate = document.getElementById('detailDate');
            const detailTitle = document.getElementById('detailTitle');
            const detailBody = document.getElementById('detailBody');

            const logoHomeBtn = document.getElementById('logoHomeBtn');

            // 設定モーダル関連
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const fontButtons = document.querySelectorAll('.font-btn');

            // ==========================================================================
            // 1. メインニュース一覧を描画
            // ==========================================================================
            function renderNews(targetArticles) {
                newsGrid.innerHTML = '';

                if (targetArticles.length === 0) {
                    newsGrid.innerHTML = `
                        <div style="grid-column: 1/-1; padding: 60px 20px; text-align: center; background: #fff; color: var(--text-sub); border: 1px dashed var(--border-color);">
                            該当する記事が見つかりませんでした。
                        </div>
                    `;
                    return;
                }

                targetArticles.forEach(article => {
                    const card = createCardElement(article);
                    newsGrid.appendChild(card);
                });
            }

            // ==========================================================================
            // 2. お気に入り登録された記事一覧を描画 (ホーム画面の下に表示)
            // ==========================================================================
            function renderBookmarks() {
                bookmarkGrid.innerHTML = '';

                // 登録されたIDの記事を抽出
                const bookmarkedArticles = articles.filter(art => bookmarkedIds.includes(art.id));

                if (bookmarkedArticles.length === 0) {
                    bookmarkGrid.innerHTML = `
                        <div style="grid-column: 1/-1; padding: 40px 20px; text-align: center; background: #fff; color: var(--text-sub); border: 1px dashed var(--border-color); font-size: 13px;">
                            お気に入りに登録された記事はここに表示されます（詳細画面から登録できます）。
                        </div>
                    `;
                    return;
                }

                bookmarkedArticles.forEach(article => {
                    const card = createCardElement(article);
                    bookmarkGrid.appendChild(card);
                });
            }

            // カード要素の生成共通処理
            function createCardElement(article) {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.setAttribute('data-id', article.id);
                
                card.innerHTML = `
                    <div class="news-title-area">
                        <h3 class="news-title">${escapeHTML(article.title)}</h3>
                        <span class="news-date">${escapeHTML(article.date)}</span>
                    </div>
                `;
                
                card.addEventListener('click', () => {
                    showArticleDetail(article);
                });
                return card;
            }

            // ==========================================================================
            // 3. 記事詳細表示（章構造・画像対応版に完全リプレイス）
            // ==========================================================================
            function showArticleDetail(article) {
                currentArticleId = article.id;
                detailDate.textContent = article.date;
                detailTitle.textContent = article.title;

                let contentHtml = '';

                // 新しい配列構造（sections）が存在する場合の処理（チャンキング描画）
                if (article.sections && Array.isArray(article.sections)) {
                    article.sections.forEach(section => {
                        // 1. 安全にテキストをエスケープ
                        const safeHeading = escapeHTML(section.heading || '');
                        let safeText = escapeHTML(section.text || '');
                        
                        // 2. 改行コードを<br>タグに置換して文章の可読性を保持
                        safeText = safeText.replace(/\n/g, '<br>');

                        // 3. 認知摩擦を下げるためのセクション単位のマークアップ組み立て
                        contentHtml += `
                            <div class="article-section" style="margin-bottom: 40px;">
                                <h3 class="article-section-title" style="font-size: 20px; font-weight: 800; color: var(--dark-color); margin-bottom: 14px; border-left: 4px solid var(--primary-color); padding-left: 12px; letter-spacing: -0.01em;">
                                    ${safeHeading}
                                </h3>
                                <p class="article-section-text" style="font-size: 16px; line-height: 1.9; color: var(--text-main); margin-bottom: 20px;">
                                    ${safeText}
                                </p>
                        `;

                        // 4. 画像情報が個別に存在する場合のみ、クリーンなHTMLとして出力
                        if (section.image) {
                            const safeImgSrc = escapeHTML(section.image);
                            contentHtml += `<img src="${safeImgSrc}" alt="記事画像" class="detail-article-img">`;
                        }

                        contentHtml += `</div>`;
                    });
                } else if (article.content) {
                    // 後方互換性：もし古いデータ形式（content文字列型）の記事データが入ってきた場合のフォールバック処理
                    let legacyContent = escapeHTML(article.content);
                    
                    // 以前の一時トークン退避方式を安全に適用
                    const images = [];
                    legacyContent = legacyContent.replace(/\[image:(.+?)]/g, (match, p1) => {
                        const token = `__ARTICLE_IMAGE_TOKEN_${images.length}__`;
                        images.push(`<img src="${escapeHTML(p1)}" alt="記事画像" class="detail-article-img">`);
                        return token;
                    });

                    legacyContent = legacyContent.replace(/\n/g, '<br>');

                    images.forEach((imgTag, index) => {
                        legacyContent = legacyContent.replace(`__ARTICLE_IMAGE_TOKEN_${index}__`, imgTag);
                    });

                    contentHtml = `<p>${legacyContent}</p>`;
                }

                // 5. 完全にパースされた構造を安全に出力
                detailBody.innerHTML = contentHtml;

                // お気に入り状態のUI更新
                updateBookmarkButtonUI(article.id);

                // 各種一覧セクションを隠して、詳細を表示
                newsSection.classList.add('hidden');
                bookmarkSection.classList.add('hidden');
                detailSection.classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // お気に入りボタンの見た目切り替え
            function updateBookmarkButtonUI(id) {
                if (bookmarkedIds.includes(id)) {
                    bookmarkToggleBtn.classList.add('active');
                    bookmarkToggleBtn.innerHTML = `<span class="star-icon">★</span> 登録済み`;
                } else {
                    bookmarkToggleBtn.classList.remove('active');
                    bookmarkToggleBtn.innerHTML = `<span class="star-icon">☆</span> お気に入りに登録`;
                }
            }

            // お気に入り登録のトグル処理
            bookmarkToggleBtn.addEventListener('click', () => {
                if (currentArticleId === null) return;

                if (bookmarkedIds.includes(currentArticleId)) {
                    // 解除
                    bookmarkedIds = bookmarkedIds.filter(id => id !== currentArticleId);
                } else {
                    // 登録
                    bookmarkedIds.push(currentArticleId);
                }

                // 保存と再描画
                localStorage.setItem('bookmarkedIds', JSON.stringify(bookmarkedIds));
                updateBookmarkButtonUI(currentArticleId);
                renderBookmarks();
            });

            // ==========================================================================
            // 4. ナビゲーション（一覧に戻る / ロゴクリックでホームに戻る）
            // ==========================================================================
            function backToHome() {
                detailSection.classList.add('hidden');
                newsSection.classList.remove('hidden');
                bookmarkSection.classList.remove('hidden');
            }

            backToListBtn.addEventListener('click', backToHome);

            logoHomeBtn.addEventListener('click', () => {
                // 検索リセット
                searchInput.value = '';
                sectionTitle.textContent = "新着順";
                searchStatus.classList.add('hidden');
                
                // ホーム画面を再描画
                backToHome();
                renderNews(articles);
                renderBookmarks();
            });

            // ==========================================================================
            // 5. 検索機能（前方・後方互換性対応：sections内の探索ロジックへのアップグレード）
            // ==========================================================================
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    
                    const query = e.target.value.trim();
                    
                    // 検索時は一旦詳細ページを閉じる
                    detailSection.classList.add('hidden');
                    newsSection.classList.remove('hidden');
                    bookmarkSection.classList.remove('hidden');

                    if (query === "") {
                        sectionTitle.textContent = "新着順";
                        searchStatus.classList.add('hidden');
                        renderNews(articles);
                        return;
                    }

                    const queryLower = query.toLowerCase();
                    const filtered = articles.filter(article => {
                        // 1. タイトルの検索判定
                        const matchTitle = article.title.toLowerCase().includes(queryLower);
                        
                        // 2. 新データ形式（sections配列）の本文・見出しの検索判定
                        let matchSections = false;
                        if (article.sections && Array.isArray(article.sections)) {
                            matchSections = article.sections.some(sec => 
                                (sec.heading && sec.heading.toLowerCase().includes(queryLower)) || 
                                (sec.text && sec.text.toLowerCase().includes(queryLower))
                            );
                        }

                        // 3. 旧データ形式（content文字列）の検索判定
                        const matchLegacyContent = article.content ? article.content.toLowerCase().includes(queryLower) : false;

                        return matchTitle || matchSections || matchLegacyContent;
                    });

                    // 検索時のヘッダー表示
                    sectionTitle.textContent = `「${query}」の検索結果...`;
                    searchStatus.textContent = "一致順";
                    searchStatus.classList.remove('hidden');
                    
                    renderNews(filtered);
                }
            });

            // ==========================================================================
            // 6. 設定モーダル（文字サイズ変更）
            // ==========================================================================
            settingsBtn.addEventListener('click', () => {
                settingsModal.classList.remove('hidden');
            });

            closeModalBtn.addEventListener('click', () => {
                settingsModal.classList.add('hidden');
            });

            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    settingsModal.classList.add('hidden');
                }
            });

            // 文字サイズ変更処理
            fontButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    fontButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const scale = btn.getAttribute('data-scale');
                    // HTMLのルート要素にCSS変数を設定
                    document.documentElement.style.setProperty('--font-scale', scale);
                });
            });

            // XSS対策
            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
                );
            }

            // 初期ロード処理
            renderNews(articles);
            renderBookmarks();
        });
    </script>
</body>
</html>
